    <!-- 🔥 CDN Fallback Loader (글로벌 배포 최적화) -->
    <script src="js/cdn-fallback-loader.js"></script>

    <!-- 
        🚀 최적화 변경사항:
        1. Blockly: CDN Fallback으로 로드 (cdnjs → jsdelivr → unpkg)
        2. Monaco Editor: 텍스트 모드 전환 시 지연 로딩 (초기 로딩 ~2MB 절감)
    -->

    <!-- Blockly CDN Fallback 로딩 스크립트 -->
    <script>
        // Blockly 로딩 상태
        window.blocklyLoaded = false;
        window.blocklyLoadPromise = null;

        // 페이지 로드 시 Blockly를 Fallback으로 로드
        (async function loadBlocklyWithFallback() {
            const cdnSources = [
                'https://cdnjs.cloudflare.com/ajax/libs/blockly/12.2.0',
                'https://cdn.jsdelivr.net/npm/blockly@12.2.0/dist',
                'https://unpkg.com/blockly@12.2.0/dist'
            ];

            const blocklyFiles = [
                'blockly_compressed.js',
                'blocks_compressed.js',
                'javascript_compressed.js',
                'msg/ko.js'
            ];

            // 스크립트 로드 헬퍼
            function loadScript(url) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.async = false; // 순차 로딩 보장

                    const timeout = setTimeout(() => {
                        script.remove();
                        reject(new Error('Timeout: ' + url));
                    }, 15000);

                    script.onload = () => {
                        clearTimeout(timeout);
                        resolve();
                    };
                    script.onerror = () => {
                        clearTimeout(timeout);
                        script.remove();
                        reject(new Error('Failed: ' + url));
                    };
                    document.head.appendChild(script);
                });
            }

            // CDN 순회 시도
            for (let i = 0; i < cdnSources.length; i++) {
                const baseUrl = cdnSources[i];
                console.log(`🔄 Blockly 로드 시도 (CDN ${i + 1}/${cdnSources.length}): ${baseUrl}`);

                try {
                    for (const file of blocklyFiles) {
                        await loadScript(`${baseUrl}/${file}`);
                    }

                    if (typeof Blockly !== 'undefined') {
                        window.blocklyLoaded = true;
                        console.log(`✅ Blockly 로드 성공 (CDN ${i + 1}): ${baseUrl}`);
                        return;
                    }
                } catch (error) {
                    console.warn(`⚠️ Blockly CDN ${i + 1} 실패:`, error.message);
                }
            }

            // 모든 CDN 실패
            console.error('❌ 모든 Blockly CDN 실패');
            alert('Blockly 라이브러리를 불러올 수 없습니다. 네트워크 연결을 확인하세요.');
        })().then(() => {
            // 🔥 Blockly 로딩 완료 후 brixel 스크립트들을 순차 로딩
            if (window.blocklyLoaded) {
                loadBrixelScripts();
            }
        });

        // Brixel 스크립트들을 순차적으로 로딩하는 함수
        async function loadBrixelScripts() {
            const scripts = [
                'brixel/brixel_core.js',
                'brixel/brixel_blocks_definitions.js',
                'brixel/brixel_blocks_code_generators.js',
                'brixel/brixel_utils.js',
                'brixel/brixel_toolbox.js',
                'brixel/brixel_assembly_recorder.js'
            ];

            for (const src of scripts) {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = () => {
                        console.error(`❌ ${src} 로드 실패`);
                        reject(new Error(`Failed to load ${src}`));
                    };
                    document.head.appendChild(script);
                });
                console.log(`✅ ${src} 로드 완료`);
            }

            window.brixelScriptsLoaded = true;
            console.log('✅ 모든 Brixel 스크립트 로딩 완료');
        }
    </script>

    <!-- Blockly 툴박스 -->
    <xml xmlns="https://developers.google.com/blockly/xml" id="toolbox" style="display: none"></xml>

    <script>
        // PC 에이전트 상태 업데이트 함수 (단순화됨)
        function updateAgentStatus(isConnected) {
            const connectionStatus = document.getElementById('connectionStatus');
            const portSelect = document.getElementById('portSelect');
            const refreshPortsBtn = document.getElementById('refreshPortsBtn');
            const compileBtn = document.getElementById('compileBtn');
            const uploadBtn = document.getElementById('uploadBtn');

            // 연결 상태 메시지 업데이트
            if (connectionStatus) {
                if (isConnected) {
                    // 번역 시스템 사용
                    const connectedText = window.IDEI18n ?
                        window.IDEI18n.getMsg('connectionStatusConnected', '✅ PC 에이전트와 연결됨') :
                        '✅ PC 에이전트와 연결됨';
                    connectionStatus.textContent = connectedText;
                    connectionStatus.className = 'connection-status connected';
                    connectionStatus.setAttribute('data-i18n', 'connectionStatusConnected');
                } else {
                    // 번역 시스템 사용
                    const disconnectedText = window.IDEI18n ?
                        window.IDEI18n.getMsg('connectionStatusDisconnected', '❌ PC 에이전트와 연결되지 않음') :
                        '❌ PC 에이전트와 연결되지 않음';
                    connectionStatus.textContent = disconnectedText;
                    connectionStatus.className = 'connection-status disconnected';
                    connectionStatus.setAttribute('data-i18n', 'connectionStatusDisconnected');
                }
            }

            // 버튼 활성화/비활성화
            if (portSelect) portSelect.disabled = !isConnected;
            if (refreshPortsBtn) refreshPortsBtn.disabled = !isConnected;
            if (compileBtn) compileBtn.disabled = !isConnected;
            if (uploadBtn) uploadBtn.disabled = !isConnected;
        }

        // 전역 함수로 등록
        window.updateAgentStatus = updateAgentStatus;

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', () => {
            updateAgentStatus(false);
        });
    </script>

    <script>
        // 에이전트 다운로드 기능
        document.addEventListener('DOMContentLoaded', function () {
            // 다운로드 파일 정보
            const downloadFiles = {
                win: {
                    url: 'https://github.com/brixel-editor/brixel-editor.github.io/releases/download/2.6.0/BrixelLocalAgent_Setup_2.6.0_win.exe',
                    filename: 'BrixelLocalAgent_Setup_2.6.0_win.exe'
                },
                mac: {
                    url: 'https://github.com/brixel-editor/brixel-editor.github.io/releases/download/2.6.0/BrixelLocalAgent_Setup_2.6.0_macOS.dmg',
                    filename: 'BrixelLocalAgent_Setup_2.6.0_macOS.dmg'
                },
                linux: {
                    url: 'https://www.gorillacell.kr/webide/download_agent/Arduino Local Agent.tar.gz',
                    filename: 'Arduino Local Agent.tar.gz'
                }
            };

            const osSelect = document.getElementById('agentOsSelect');
            const downloadBtn = document.getElementById('downloadAgentBtn');

            function downloadFile(url, filename) {
                // 다운로드 중 cleanup 방지를 위한 플래그 설정
                window.isDownloading = true;

                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.style.display = 'none';

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // 다운로드 완료 후 플래그 해제
                setTimeout(() => {
                    window.isDownloading = false;
                }, 500);
            }

            if (downloadBtn && osSelect) {
                downloadBtn.addEventListener('click', function () {
                    const selectedOs = osSelect.value;
                    const fileInfo = downloadFiles[selectedOs];

                    if (fileInfo) {
                        downloadFile(fileInfo.url, fileInfo.filename);

                        const originalText = downloadBtn.innerHTML;
                        downloadBtn.innerHTML = '⬇️ 다운로드 중...';
                        downloadBtn.disabled = true;

                        setTimeout(() => {
                            downloadBtn.innerHTML = originalText;
                            downloadBtn.disabled = false;
                        }, 2000);
                    }
                });
            }

            if (osSelect && downloadBtn) {
                osSelect.addEventListener('change', function () {
                    const selectedOs = this.value;
                    const osNames = {
                        win: 'Windows',
                        mac: 'macOS',
                        linux: 'Linux'
                    };
                    downloadBtn.title = `${osNames[selectedOs]} 용 에이전트 다운로드`;
                });
            }
        });
    </script>

    <!-- 플로팅 팝업 관리 스크립트 (드래그 가능, 최소화 가능, 다국어 지원) -->
    <script>
        // 플로팅 팝업 관리 클래스
        class PopupManager {
            constructor(configUrl = 'popup-config.json') {
                this.configUrl = configUrl;
                this.overlay = document.getElementById('popupOverlay');
                this.modal = document.getElementById('popupModal');
                this.header = document.getElementById('popupHeader');
                this.headerTitle = document.getElementById('popupHeaderTitle');
                this.content = document.getElementById('popupContent');
                this.closeBtn = document.getElementById('popupCloseBtn');
                this.closeBtn2 = document.getElementById('popupCloseBtn2');
                this.minimizeBtn = document.getElementById('popupMinimizeBtn');
                this.dontShowAgain = document.getElementById('popupDontShowAgain');
                this.dontShowAgainLabel = this.dontShowAgain ? this.dontShowAgain.nextElementSibling : null;
                this.currentPopup = null;
                this.config = null;
                this.currentLanguage = this.detectLanguage();
                this.isMinimized = false;

                // 드래그 관련 변수
                this.isDragging = false;
                this.startX = 0;
                this.startY = 0;
                this.initialX = 0;
                this.initialY = 0;

                this.init();
            }

            // 브라우저 언어 감지
            detectLanguage() {
                const languageSelect = document.getElementById('languageSelect');
                if (languageSelect && languageSelect.value) {
                    return languageSelect.value;
                }

                const browserLang = navigator.language || navigator.userLanguage;
                const langCode = browserLang.split('-')[0];

                const supportedLangs = ['ko', 'en', 'ja', 'zh', 'ar'];
                return supportedLangs.includes(langCode) ? langCode : 'en';
            }

            async init() {
                try {
                    const response = await fetch(this.configUrl);
                    this.config = await response.json();

                    if (this.config.enabled && this.config.popups && this.config.popups.length > 0) {
                        for (const popup of this.config.popups) {
                            if (this.shouldShowPopup(popup)) {
                                this.showPopup(popup);
                                break;
                            }
                        }
                    }
                } catch (error) {
                    console.log('팝업 설정을 불러올 수 없습니다:', error);
                }

                // 이벤트 리스너 설정
                this.closeBtn.addEventListener('click', () => this.closePopup());
                this.closeBtn2.addEventListener('click', () => this.closePopup());
                this.minimizeBtn.addEventListener('click', () => this.toggleMinimize());

                // 드래그 기능
                this.header.addEventListener('mousedown', (e) => this.startDragging(e));
                document.addEventListener('mousemove', (e) => this.drag(e));
                document.addEventListener('mouseup', () => this.stopDragging());

                // 터치 이벤트 (모바일)
                this.header.addEventListener('touchstart', (e) => this.startDragging(e));
                document.addEventListener('touchmove', (e) => this.drag(e));
                document.addEventListener('touchend', () => this.stopDragging());

                // 언어 선택기 변경 감지
                const languageSelect = document.getElementById('languageSelect');
                if (languageSelect) {
                    languageSelect.addEventListener('change', (e) => {
                        this.currentLanguage = e.target.value;
                        this.updatePopupLanguage();
                    });
                }

                // 전역 언어 변경 이벤트
                window.addEventListener('languageChanged', (e) => {
                    if (e.detail && e.detail.language) {
                        this.currentLanguage = e.detail.language;
                        this.updatePopupLanguage();
                    }
                });
            }

            startDragging(e) {
                if (e.target.closest('.popup-header-btn')) return;

                this.isDragging = true;

                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                const rect = this.overlay.getBoundingClientRect();
                this.startX = clientX - rect.left;
                this.startY = clientY - rect.top;

                this.overlay.style.transition = 'none';
                this.modal.style.cursor = 'grabbing';
            }

            drag(e) {
                if (!this.isDragging) return;

                e.preventDefault();

                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                let newX = clientX - this.startX;
                let newY = clientY - this.startY;

                // 화면 경계 체크
                const maxX = window.innerWidth - this.modal.offsetWidth;
                const maxY = window.innerHeight - this.modal.offsetHeight;

                newX = Math.max(0, Math.min(newX, maxX));
                newY = Math.max(0, Math.min(newY, maxY));

                this.overlay.style.left = newX + 'px';
                this.overlay.style.top = newY + 'px';
                this.overlay.style.right = 'auto';
            }

            stopDragging() {
                this.isDragging = false;
                this.modal.style.cursor = '';
                this.overlay.style.transition = '';
            }

            toggleMinimize() {
                this.isMinimized = !this.isMinimized;

                if (this.isMinimized) {
                    this.overlay.classList.add('minimized');
                    this.minimizeBtn.textContent = '□';
                    this.minimizeBtn.title = '복원';
                } else {
                    this.overlay.classList.remove('minimized');
                    this.minimizeBtn.textContent = '─';
                    this.minimizeBtn.title = '최소화';
                }
            }

            shouldShowPopup(popup) {
                if (!popup.showOnce) return true;

                const key = `popup_${popup.id}_v${popup.version}`;
                return !localStorage.getItem(key);
            }

            getPopupTranslation(popup) {
                if (!popup.translations) {
                    return {
                        title: popup.title || '',
                        content: popup.content || '',
                        buttonText: popup.buttonText || 'OK',
                        dontShowAgain: 'Don\'t show again'
                    };
                }

                if (popup.translations[this.currentLanguage]) {
                    return popup.translations[this.currentLanguage];
                }

                if (popup.translations['en']) {
                    return popup.translations['en'];
                }

                const firstLang = Object.keys(popup.translations)[0];
                return popup.translations[firstLang] || {};
            }

            showPopup(popup) {
                this.currentPopup = popup;

                const translation = this.getPopupTranslation(popup);

                this.headerTitle.innerHTML = translation.title;
                this.content.innerHTML = translation.content.join('');
                this.closeBtn.textContent = translation.buttonText || 'OK';

                if (this.dontShowAgainLabel) {
                    this.dontShowAgainLabel.textContent = translation.dontShowAgain || 'Don\'t show again';
                }

                if (popup.width) {
                    this.modal.style.width = popup.width;
                }

                if (this.currentLanguage === 'ar') {
                    this.modal.style.direction = 'rtl';
                } else {
                    this.modal.style.direction = 'ltr';
                }

                // 위치 초기화
                this.overlay.style.top = '80px';
                this.overlay.style.right = '20px';
                this.overlay.style.left = 'auto';

                this.overlay.classList.add('active');
                this.isMinimized = false;
            }

            updatePopupLanguage() {
                if (this.overlay.classList.contains('active') && this.currentPopup) {
                    const translation = this.getPopupTranslation(this.currentPopup);

                    this.headerTitle.innerHTML = translation.title;
                    this.content.innerHTML = translation.content.join('');
                    this.closeBtn.textContent = translation.buttonText || 'OK';

                    if (this.dontShowAgainLabel) {
                        this.dontShowAgainLabel.textContent = translation.dontShowAgain || 'Don\'t show again';
                    }

                    if (this.currentLanguage === 'ar') {
                        this.modal.style.direction = 'rtl';
                    } else {
                        this.modal.style.direction = 'ltr';
                    }
                }
            }

            closePopup() {
                if (this.currentPopup && this.dontShowAgain.checked) {
                    const key = `popup_${this.currentPopup.id}_v${this.currentPopup.version}`;
                    localStorage.setItem(key, 'true');
                }

                this.overlay.classList.remove('active');
                this.overlay.classList.remove('minimized');
                this.dontShowAgain.checked = false;
                this.currentPopup = null;
                this.isMinimized = false;
            }
        }

        // 페이지 로드 시 팝업 매니저 초기화
        document.addEventListener('DOMContentLoaded', () => {
            window.popupManager = new PopupManager();
        });
    </script>
